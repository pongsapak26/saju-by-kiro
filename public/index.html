<script>
// ===== SAJU ENGINE =====
const STEMS = ['갑','을','병','정','무','기','경','신','임','계'];
const BRANCHES = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
const STEM_HANJA = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BRANCH_HANJA = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const STEM_ELEMENTS = ['목','목','화','화','토','토','금','금','수','수'];
const BRANCH_ELEMENTS = ['수','토','목','목','토','화','화','토','금','금','토','수'];
const ELEMENT_NAMES = { '목':'Wood/ไม้', '화':'Fire/ไฟ', '토':'Earth/ดิน', '금':'Metal/โลหะ', '수':'Water/น้ำ' };
const ELEMENT_COLORS = { '목':'element-wood', '화':'element-fire', '토':'element-earth', '금':'element-metal', '수':'element-water' };
const ELEMENT_BAR = { '목':'bar-wood', '화':'bar-fire', '토':'bar-earth', '금':'bar-metal', '수':'bar-water' };
const ELEMENT_EMOJI = { '목':'🌳', '화':'🔥', '토':'⛰️', '금':'⚔️', '수':'💧' };

function getYearPillar(year) {
  const si = (year - 4) % 10; const bi = (year - 4) % 12;
  return { stem: (si+10)%10, branch: (bi+12)%12 };
}

function getMonthPillar(year, month) {
  const yStem = getYearPillar(year).stem;
  const baseStems = [2,4,6,8,0]; // 병,무,경,임,갑 for year stems 0-4 groups
  const base = baseStems[yStem % 5];
  const mStem = (base + (month - 1)) % 10;
  const mBranch = (month + 1) % 12;
  return { stem: mStem, branch: mBranch };
}

function getDayPillar(year, month, day) {
  const y = (month <= 2) ? year - 1 : year;
  const m = (month <= 2) ? month + 12 : month;
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  const jdn = Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + day + B - 1524.5;
  const jdnInt = Math.floor(jdn + 0.5);
  const idx = (jdnInt + 35) % 60;
  return { stem: ((idx % 10) + 10) % 10, branch: ((idx % 12) + 12) % 12 };
}

function getHourPillar(dayStem, hour) {
  let bi;
  if (hour >= 23 || hour < 1) bi = 0;
  else if (hour < 3) bi = 1;
  else if (hour < 5) bi = 2;
  else if (hour < 7) bi = 3;
  else if (hour < 9) bi = 4;
  else if (hour < 11) bi = 5;
  else if (hour < 13) bi = 6;
  else if (hour < 15) bi = 7;
  else if (hour < 17) bi = 8;
  else if (hour < 19) bi = 9;
  else if (hour < 21) bi = 10;
  else bi = 11;
  const base = [0,2,4,6,8]; // 갑,병,무,경,임
  const hStem = (base[dayStem % 5] + bi) % 10;
  return { stem: hStem, branch: bi };
}

function pillarStr(p) {
  return STEMS[p.stem] + BRANCHES[p.branch];
}

function pillarHanja(p) {
  return STEM_HANJA[p.stem] + BRANCH_HANJA[p.branch];
}

// ===== ANALYSIS ENGINE =====
const PERSONALITY = {
  '갑': { th: 'ผู้นำโดยธรรมชาติ มีความมุ่งมั่น ตรงไปตรงมา เหมือนต้นไม้ใหญ่ที่แข็งแกร่ง', kr: '갑목(甲木) - 큰 나무의 기운' },
  '을': { th: 'อ่อนโยน ยืดหยุ่น ปรับตัวเก่ง เหมือนเถาวัลย์ที่อ่อนแต่เหนียว', kr: '을목(乙木) - 풀과 꽃의 기운' },
  '병': { th: 'สดใส ร่าเริง มีเสน่ห์ เหมือนดวงอาทิตย์ที่ส่องสว่าง', kr: '병화(丙火) - 태양의 기운' },
  '정': { th: 'อบอุ่น ละเอียดอ่อน มีความคิดสร้างสรรค์ เหมือนเปลวเทียน', kr: '정화(丁火) - 촛불의 기운' },
  '무': { th: 'มั่นคง น่าเชื่อถือ ใจกว้าง เหมือนภูเขาที่หนักแน่น', kr: '무토(戊土) - 산의 기운' },
  '기': { th: 'ใส่ใจรายละเอียด อดทน เอื้อเฟื้อ เหมือนผืนดินที่อุดมสมบูรณ์', kr: '기토(己土) - 논밭의 기운' },
  '경': { th: 'เด็ดขาด ยุติธรรม กล้าหาญ เหมือนดาบที่คมกริบ', kr: '경금(庚金) - 강철의 기운' },
  '신': { th: 'ฉลาด ประณีต มีรสนิยม เหมือนอัญมณีที่เจียระไน', kr: '신금(辛金) - 보석의 기운' },
  '임': { th: 'ฉลาดหลักแหลม กล้าเสี่ยง มีวิสัยทัศน์ เหมือนมหาสมุทร', kr: '임수(壬水) - 바다의 기운' },
  '계': { th: 'อ่อนไหว สังเกตการณ์ดี มีสัญชาตญาณ เหมือนสายฝน', kr: '계수(癸水) - 비와 이슬의 기운' }
};

function analyzeElements(pillars) {
  const count = { '목':0, '화':0, '토':0, '금':0, '수':0 };
  pillars.forEach(p => {
    count[STEM_ELEMENTS[p.stem]]++;
    count[BRANCH_ELEMENTS[p.branch]]++;
  });
  return count;
}

function getAnalysis(dayMasterStem, elementCount) {
  const dm = STEMS[dayMasterStem];
  const dmElement = STEM_ELEMENTS[dayMasterStem];
  const total = Object.values(elementCount).reduce((a,b)=>a+b,0);
  const sections = [];

  // Personality
  const p = PERSONALITY[dm];
  sections.push({ title: '🧑 บุคลิกภาพ (성격)', content: `${p.kr}\n${p.th}` });

  // Love
  const loveMap = { '목':'มีความรักที่เติบโตอย่างมั่นคง ให้ความสำคัญกับอิสระของคู่ครอง', '화':'รักอย่างเร่าร้อน ชอบความตื่นเต้น แต่ต้องระวังอารมณ์ร้อน', '토':'รักมั่นคง ซื่อสัตย์ แต่อาจดูน่าเบื่อในสายตาคนอื่น', '금':'มีมาตรฐานสูง เลือกคู่ครองอย่างพิถีพิถัน รักยาวนาน', '수':'โรแมนติก ปรับตัวเก่ง แต่อาจลังเลใจบ่อย' };
  sections.push({ title: '❤️ ความรัก (연애운)', content: loveMap[dmElement] });

  // Career
  const careerMap = { '목':'เหมาะกับงานสร้างสรรค์ การศึกษา หรือธุรกิจที่เติบโต', '화':'เหมาะกับงานที่ต้องใช้พลังงาน การแสดง สื่อ หรือการตลาด', '토':'เหมาะกับงานบริหาร อสังหาริมทรัพย์ หรืองานที่ต้องความมั่นคง', '금':'เหมาะกับงานกฎหมาย การเงิน เทคโนโลยี หรืองานที่ต้องความแม่นยำ', '수':'เหมาะกับงานวิจัย การค้าระหว่างประเทศ หรืองานที่ต้องความยืดหยุ่น' };
  sections.push({ title: '💼 การงาน (직업운)', content: careerMap[dmElement] });

  // Health
  const healthMap = { '목':'ระวังเรื่องตับ ตา และระบบประสาท ควรออกกำลังกายแบบยืดเหยียด', '화':'ระวังเรื่องหัวใจ ความดัน และลำไส้เล็ก ควรพักผ่อนให้เพียงพอ', '토':'ระวังเรื่องกระเพาะ ม้าม และระบบย่อยอาหาร ควรกินอาหารตรงเวลา', '금':'ระวังเรื่องปอด ผิวหนัง และลำไส้ใหญ่ ควรหายใจอากาศบริสุทธิ์', '수':'ระวังเรื่องไต กระเพาะปัสสาวะ และกระดูก ควรดื่มน้ำให้เพียงพอ' };
  sections.push({ title: '🏥 สุขภาพ (건강운)', content: healthMap[dmElement] });

  // Finance
  const financeMap = { '목':'การเงินเติบโตช้าแต่มั่นคง เหมาะกับการลงทุนระยะยาว', '화':'มีโอกาสรายได้สูง แต่ใช้จ่ายเร็ว ควรวางแผนการเงิน', '토':'การเงินมั่นคง สะสมทรัพย์ได้ดี เหมาะกับอสังหาริมทรัพย์', '금':'มีวินัยทางการเงินดี เหมาะกับการลงทุนในทองคำหรือหุ้น', '수':'การเงินผันผวน มีโอกาสได้มากเสียมาก ควรกระจายความเสี่ยง' };
  sections.push({ title: '💰 การเงิน (재물운)', content: financeMap[dmElement] });

  // Advice based on missing/excess elements
  const missing = Object.entries(elementCount).filter(([k,v]) => v === 0).map(([k]) => k);
  const excess = Object.entries(elementCount).filter(([k,v]) => v >= 4).map(([k]) => k);
  let advice = '';
  if (missing.length > 0) {
    advice += `ธาตุที่ขาด: ${missing.map(e => `${ELEMENT_EMOJI[e]} ${e}(${ELEMENT_NAMES[e]})`).join(', ')}\n`;
    const tips = { '목':'ควรอยู่ใกล้ธรรมชาติ ปลูกต้นไม้ สวมสีเขียว', '화':'ควรรับแสงแดด จุดเทียน สวมสีแดง', '토':'ควรเดินดิน ทำสวน สวมสีเหลือง', '금':'ควรสวมเครื่องประดับโลหะ สวมสีขาว', '수':'ควรอยู่ใกล้น้ำ ดื่มน้ำมากๆ สวมสีดำ/น้ำเงิน' };
    missing.forEach(e => { advice += `  → ${tips[e]}\n`; });
  }
  if (excess.length > 0) {
    advice += `ธาตุที่มากเกิน: ${excess.map(e => `${ELEMENT_EMOJI[e]} ${e}(${ELEMENT_NAMES[e]})`).join(', ')}\n`;
    advice += '  → ควรเสริมธาตุที่ข่มธาตุนี้เพื่อสร้างสมดุล\n';
  }
  if (!advice) advice = 'ธาตุทั้ง 5 ค่อนข้างสมดุล ถือว่าดวงชะตาดี';
  sections.push({ title: '💡 คำแนะนำ (조언)', content: advice });

  return sections;
}

// ===== UI LOGIC =====
let lastResult = null;

function calculateSaju() {
  const name = document.getElementById('name').value.trim();
  const gender = document.getElementById('gender').value;
  const birthdate = document.getElementById('birthdate').value;
  const birthtime = document.getElementById('birthtime').value;
  const errEl = document.getElementById('form-error');

  const missing = [];
  if (!name) missing.push('ชื่อ');
  if (!gender) missing.push('เพศ');
  if (!birthdate) missing.push('วันเกิด');
  if (!birthtime) missing.push('เวลาเกิด');
  if (missing.length > 0) {
    errEl.textContent = `กรุณากรอก: ${missing.join(', ')}`;
    errEl.classList.remove('hidden');
    return;
  }
  errEl.classList.add('hidden');

  const [y, m, d] = birthdate.split('-').map(Number);
  const [hh, mm] = birthtime.split(':').map(Number);
  const hour = hh + mm / 60;

  const yearP = getYearPillar(y);
  const monthP = getMonthPillar(y, m);
  const dayP = getDayPillar(y, m, d);
  const hourP = getHourPillar(dayP.stem, hour);
  const pillars = [yearP, monthP, dayP, hourP];

  const elementCount = analyzeElements(pillars);
  const analysis = getAnalysis(dayP.stem, elementCount);

  // Day Master
  const dmEl = STEM_ELEMENTS[dayP.stem];
  document.getElementById('day-master').innerHTML = `<span class="${ELEMENT_COLORS[dmEl]}">${STEMS[dayP.stem]}(${STEM_HANJA[dayP.stem]})</span>`;
  document.getElementById('day-master-element').innerHTML = `${ELEMENT_EMOJI[dmEl]} ${dmEl} — ${ELEMENT_NAMES[dmEl]}`;

  // Pillars
  const pillarIds = ['p-year','p-month','p-day','p-hour'];
  const pillarData = [yearP, monthP, dayP, hourP];
  // Display order: hour, day, month, year (right to left in traditional, but we show left to right)
  const displayOrder = [hourP, dayP, monthP, yearP];
  const displayIds = ['p-hour','p-day','p-month','p-year'];
  displayOrder.forEach((p, i) => {
    const sEl = STEM_ELEMENTS[p.stem];
    const bEl = BRANCH_ELEMENTS[p.branch];
    document.getElementById(displayIds[i]).innerHTML = `
      <div class="text-2xl font-bold ${ELEMENT_COLORS[sEl]}">${STEMS[p.stem]}</div>
      <div class="text-xs text-zinc-500">${STEM_HANJA[p.stem]} · ${ELEMENT_NAMES[sEl]}</div>
      <div class="border-t border-zinc-700 my-1"></div>
      <div class="text-2xl font-bold ${ELEMENT_COLORS[bEl]}">${BRANCHES[p.branch]}</div>
      <div class="text-xs text-zinc-500">${BRANCH_HANJA[p.branch]} · ${ELEMENT_NAMES[bEl]}</div>
    `;
  });

  // Elements chart
  const maxCount = Math.max(...Object.values(elementCount), 1);
  document.getElementById('elements-chart').innerHTML = Object.entries(elementCount).map(([el, cnt]) => `
    <div class="flex items-center gap-3">
      <span class="w-24 text-sm ${ELEMENT_COLORS[el]}">${ELEMENT_EMOJI[el]} ${el}(${ELEMENT_NAMES[el].split('/')[0]})</span>
      <div class="flex-1 bg-zinc-800 h-6 relative">
        <div class="${ELEMENT_BAR[el]} h-6 transition-all duration-500" style="width:${(cnt/maxCount)*100}%"></div>
      </div>
      <span class="text-sm text-zinc-400 w-6 text-right">${cnt}</span>
    </div>
  `).join('');

  // Analysis
  document.getElementById('analysis-content').innerHTML = analysis.map(s => `
    <div class="border-l-2 border-zinc-700 pl-4">
      <h4 class="font-bold text-white mb-1">${s.title}</h4>
      <p class="text-zinc-400">${s.content.replace(/\n/g,'<br>')}</p>
    </div>
  `).join('');

  // Store result
  lastResult = {
    name, gender: gender === 'male' ? 'ชาย' : 'หญิง', birthdate, birthtime,
    yearP: pillarStr(yearP), monthP: pillarStr(monthP),
    dayP: pillarStr(dayP), hourP: pillarStr(hourP),
    yearPH: pillarHanja(yearP), monthPH: pillarHanja(monthP),
    dayPH: pillarHanja(dayP), hourPH: pillarHanja(hourP),
    dayMaster: `${STEMS[dayP.stem]}(${STEM_HANJA[dayP.stem]}) — ${ELEMENT_NAMES[dmEl]}`,
    elementCount, analysis
  };

  document.getElementById('result-section').classList.remove('hidden');

  // Save to DB (non-blocking)
  const resultText = buildCopyText();
  fetch('/api/readings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name, birthDate: birthdate, birthTime: birthtime, gender,
      yearPillar: pillarStr(yearP), monthPillar: pillarStr(monthP),
      dayPillar: pillarStr(dayP), hourPillar: pillarStr(hourP),
      resultText
    })
  }).catch(() => {});
}

// ===== COPY & AI =====
function buildCopyText() {
  if (!lastResult) return '';
  const r = lastResult;
  let t = `=== ผลดูดวงซาจู (사주) ===\n`;
  t += `ชื่อ: ${r.name} | เพศ: ${r.gender}\n`;
  t += `วันเกิด: ${r.birthdate} | เวลา: ${r.birthtime}\n\n`;
  t += `--- เสาทั้ง 4 (四柱) ---\n`;
  t += `เสาปี (년주): ${r.yearP} (${r.yearPH})\n`;
  t += `เสาเดือน (월주): ${r.monthP} (${r.monthPH})\n`;
  t += `เสาวัน (일주): ${r.dayP} (${r.dayPH})\n`;
  t += `เสาชั่วโมง (시주): ${r.hourP} (${r.hourPH})\n\n`;
  t += `เจ้าชะตา (일간): ${r.dayMaster}\n\n`;
  t += `--- สมดุลธาตุ (오행) ---\n`;
  Object.entries(r.elementCount).forEach(([el, cnt]) => {
    t += `${el}(${ELEMENT_NAMES[el]}): ${'█'.repeat(cnt)}${'░'.repeat(Math.max(0,8-cnt))} ${cnt}\n`;
  });
  t += '\n';
  r.analysis.forEach(s => {
    t += `${s.title}\n${s.content}\n\n`;
  });
  return t;
}

function copyResult() {
  const text = buildCopyText();
  const btn = document.getElementById('copy-btn');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✅ คัดลอกแล้ว';
      setTimeout(() => { btn.textContent = '📋 คัดลอกผลดูดวง'; }, 2000);
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta);
  ta.select(); document.execCommand('copy');
  document.body.removeChild(ta);
  const btn = document.getElementById('copy-btn');
  btn.textContent = '✅ คัดลอกแล้ว';
  setTimeout(() => { btn.textContent = '📋 คัดลอกผลดูดวง'; }, 2000);
}

async function askAI() {
  const provider = document.getElementById('ai-provider').value;
  const apiKey = document.getElementById('ai-key').value.trim();
  const extraPrompt = document.getElementById('ai-prompt').value.trim();
  const btn = document.getElementById('ai-btn');
  const resBox = document.getElementById('ai-response-box');
  const resEl = document.getElementById('ai-response');

  if (!apiKey) { alert('กรุณากรอก API Key'); return; }
  if (!lastResult) { alert('กรุณาดูดวงก่อน'); return; }

  const sajuText = buildCopyText();
  const systemMsg = 'คุณเป็นนักโหราศาสตร์เกาหลี (사주) ผู้เชี่ยวชาญ ให้วิเคราะห์ดวงซาจูอย่างละเอียดเป็นภาษาไทย';
  const userMsg = `${sajuText}\n\n${extraPrompt || 'กรุณาวิเคราะห์ดวงซาจูนี้อย่างละเอียด ครอบคลุมทุกด้าน'}`;

  btn.disabled = true;
  btn.textContent = '⏳ กำลังวิเคราะห์...';
  resBox.classList.remove('hidden');
  resEl.innerHTML = '<span class="typing text-zinc-500">กำลังรอคำตอบจาก AI</span>';

  try {
    let result = '';
    if (provider === 'openai') {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'system', content: systemMsg }, { role: 'user', content: userMsg }], max_tokens: 2000 })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      result = data.choices[0].message.content;
    } else if (provider === 'anthropic') {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 2000, system: systemMsg, messages: [{ role: 'user', content: userMsg }] })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      result = data.content[0].text;
    } else if (provider === 'gemini') {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: `${systemMsg}\n\n${userMsg}` }] }] })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      result = data.candidates[0].content.parts[0].text;
    }
    resEl.textContent = result;
  } catch (e) {
    resEl.innerHTML = `<span class="text-red-500">เกิดข้อผิดพลาด: ${e.message}</span>`;
  }
  btn.disabled = false;
  btn.textContent = 'ส่งให้ AI วิเคราะห์';
}
